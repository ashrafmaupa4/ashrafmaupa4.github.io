<!DOCTYPE html>
<html>
<head>
    <title>Login - My Family</title>
    <style>
        body { font-family: Arial; background: #111; color: white; display: flex; justify-content: center; align-items: center; min-height: 100dvh; margin: 0; }
        .login-box { background: #222; padding: 30px; border-radius: 8px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #00C853; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #00E676; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Family Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <button id="signupBtn" style="background:#555; margin-top:10px;">Sign Up</button>
        <p id="error" style="color:#ff5252;"></p>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAC5gT6psm6h05o3YfV8HDcNeeFZWCZzn8",
        authDomain: "ashraf-family.firebaseapp.com",
        projectId: "ashraf-family",
        storageBucket: "ashraf-family.firebasestorage.app",
        messagingSenderId: "1069088838050",
        appId: "1:1069088838050:web:5f609f6d608da46db0e2fb"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      document.getElementById('loginBtn').onclick = () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, email, password)
          .then(() => window.location.href = "index.html")
          .catch(e => document.getElementById('error').innerText = e.message);
      };

      document.getElementById('signupBtn').onclick = () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        createUserWithEmailAndPassword(auth, email, password)
          .then(() => window.location.href = "index.html")
          .catch(e => document.getElementById('error').innerText = e.message);
      };
    </script>
</body>
</html>
