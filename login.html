<!DOCTYPE html>
<html>
<head>
  <title>Family Login</title>
</head>
<body>
  <!-- Your existing form -->
  <div>
    <h2>Family Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="login-btn">Login</button>
    <button id="signup-btn">Sign Up</button>
  </div>

  <!-- Firebase code - put this at the bottom before </body> -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCjf1yv0kUk9PnOO2pV891mD4ciHDVar38,
      authDomain: "ashraf-family.firebaseapp.com",
      projectId: "ashraf-family",
      storageBucket: "ashraf-family.firebasestorage.app",
      messagingSenderId: "1069088838050",
      appId: "1:1069088838050:web:5f409f3a6d084a4a0be0c7b",
      measurementId: "G-LD9W0EC8JP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    console.log("Firebase loaded");

    // LOGIN BUTTON
    document.getElementById('login-btn').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      console.log("Trying to log in:", email);

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          console.log("Success:", userCredential.user);
          alert('Logged in! Welcome ' + userCredential.user.email);
          window.location.href = 'index.html'; //no
        })
        .catch((error) => {
          console.error("Login error:", error.code, error.message);
          alert('Login failed: ' + error.message);
        });
    });

    // SIGN UP BUTTON
    document.getElementById('signup-btn').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      console.log("Trying to sign up:", email);

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          console.log("Success:", userCredential.user);window.location.href = 'index.html';
          alert('Account created! Logged in as ' + userCredential.user.email);
        })
        .catch((error) => {
          console.error("Signup error:", error.code, error.message);
          alert('Signup failed: ' + error.message);
        });
    });
  </script>
</body>
</html>
