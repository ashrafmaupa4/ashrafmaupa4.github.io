<!DOCTYPE html>
<html>
<head>
    <title>Login - My Family</title>
    <style>
        body { 
            font-family: Arial; 
            background: #111; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box { 
            background: #222; 
            padding: 30px; 
            border-radius: 10px;
            width: 300px;
        }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 8px 0;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #00C851;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 5px 0;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #00E676; }
        #error { color: #ff5252; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Family Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="signUp()" style="background:#33b5e5">Sign Up</button>
        <p id="error"></p>
    </div>
