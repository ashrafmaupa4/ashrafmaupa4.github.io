<!DOCTYPE html>
<html>
<head>
  <title>About</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .about {
      position: relative;
      height: 600px;
      background: url('family.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* Overlay */
    .about::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      min-height:40vh;
    }
        footer {
      background-color: black;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .about-content {
      position: relative;
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    .about h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .about p {
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="about">
  <div class="about-content">
    <h2>About Us</h2>
    <p>
      Welcome to our family website. This is where we share our memories,
      special moments, and experiences together.
    </p>

    <a href="gallery.html" class="btn">View Gallery</a>
  </div>
</div>
<footer>
    <p>@home</p>

</footer>

</body>
</html>
