<!DOCTYPE html>
<html>
<head>
  <title>Contact</title>
  <style>
      .navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #222;
  padding: 15px 30px;
}

.logo {
  color: white;
  margin: 0;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #00c6ff;
}
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height:100dvh;
    }

    /* SECTION WITH BACKGROUND + OVERLAY */
    .contact-section {
      position: relative;
      min-height: 89vh;
      background: url('family.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .contact-section::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      top: 0;
      left: 0;
    }

    /* FORM BOX */
    .contact-box {
      position: relative;
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .contact-box h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .contact-box input,
    .contact-box textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .contact-box textarea {
      height: 120px;
      resize: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0056b3;
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 10px;
      text-decoration: none;
      color: #007BFF;
    }

    /* FOOTER */
    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>
<body>
    <nav class="navbar">
  <h2 class="logo">My Family</h2>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="about.html">About</a></li>
    
  </ul>
</nav>

<div class="contact-section">
  <div class="contact-box">
    <h2>Contact Us</h2>

    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" required></textarea>

      <button type="submit" class="btn">Send Message</button>
    </form>

    <a href="ashra1.html" class="back">← Back Home</a>
  </div>
</div>

<footer>
  <p>© 2026 Our Family Website</p>
</footer>

</body>
</html>
